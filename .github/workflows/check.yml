name: Mail Check

on:
  schedule:
    - cron: "*/5 * * * *"   # 5分ごとに実行
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check mail
        env:
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: python scripts/check_mail.py

      - name: Commit state if updated
        run: |
          git config user.name "fumiya19991110-ai"
          git config user.email "fumiya19991110-ai@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update mail state"
            git push
          fi
